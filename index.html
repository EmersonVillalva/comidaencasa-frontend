<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ComidaEnCasa</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="html/login.html">Login</a>
            <a href="html/register.html">Registro</a>
            <a href="html/restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="hero">
        <h1>Pide comida a domicilio</h1>
        <p>Busca restaurantes cerca de ti</p>
        <div class="search-box">
            <input id="buscador" placeholder="Buscar restaurante..." onkeyup="buscarRestaurante()">
        </div>
    </div>

    <div class="container">
        <h2>Restaurantes</h2>
        <div class="grid" id="restaurantes"></div>
        <p id="error"></p>
    </div>

    <footer>
        <p>ComidaEnCasa 2026</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let restaurantes = [];

        async function cargarRestaurantes() {
            try {
                const res = await fetch(API + "/restaurantes.php");
                if (!res.ok) throw new Error("Error cargando restaurantes");
                restaurantes = await res.json();
                mostrar(restaurantes);
            } catch (err) {
                document.getElementById("error").textContent = err.message;
            }
        }

        function mostrar(lista) {
            const cont = document.getElementById("restaurantes");
            cont.innerHTML = "";
            lista.forEach(r => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="https://picsum.photos/300/200?random=${r.id}">
                    <div class="card-content">
                        <h3>${r.nombre}</h3>
                        <p>${r.descripcion || ""}</p>
                        <button onclick="verMenu(${r.id})">Ver menú</button>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function buscarRestaurante() {
            const texto = document.getElementById("buscador").value.toLowerCase();
            const filtrados = restaurantes.filter(r => r.nombre.toLowerCase().includes(texto));
            mostrar(filtrados);
        }

        function verMenu(id) {
            window.location.href = "html/restaurante.html?id=" + id;
        }

        cargarRestaurantes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Registro - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .rol-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .rol-opcion {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .rol-opcion:hover {
            border-color: #ff6b6b;
        }
        .rol-opcion.seleccionado {
            border-color: #ff6b6b;
            background: #fff0f0;
        }
        .rol-opcion h3 {
            margin-bottom: 5px;
        }
        .rol-opcion p {
            font-size: 12px;
            color: #666;
        }
        .campo-restaurante {
            display: none;
        }
        .campo-restaurante.visible {
            display: block;
        }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        .mensaje-error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .mensaje-exito {
            color: green;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="login.html">Login</a>
            <a href="register.html">Registro</a>
            <a href="restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="form-card">
        <h2>Crear cuenta</h2>
        
        <div class="rol-selector">
            <div class="rol-opcion" data-rol="cliente" onclick="seleccionarRol('cliente')">
                <h3>👤 Cliente</h3>
                <p>Pide comida a domicilio</p>
            </div>
            <div class="rol-opcion" data-rol="restaurante" onclick="seleccionarRol('restaurante')">
                <h3>🏪 Restaurante</h3>
                <p>Gestiona tus pedidos</p>
            </div>
            <div class="rol-opcion" data-rol="repartidor" onclick="seleccionarRol('repartidor')">
                <h3>🛵 Repartidor</h3>
                <p>Reparte pedidos</p>
            </div>
        </div>
        
        <input id="nombre" placeholder="Nombre completo">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">
        <input id="direccion" placeholder="Dirección (opcional)">
        
        <div id="campo-restaurante" class="campo-restaurante">
            <label>Selecciona tu restaurante:</label>
            <select id="restaurante_id">
                <option value="">-- Selecciona un restaurante --</option>
            </select>
        </div>
        
        <button onclick="registrar()">Registrarse</button>
        <p id="mensaje"></p>
        
        <p style="text-align:center; margin-top:15px;">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </p>
    </div>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let rolSeleccionado = 'cliente';

        // Cargar restaurantes para el selector
        async function cargarRestaurantes() {
            try {
                const res = await fetch(API + "/restaurantes.php");
                const restaurantes = await res.json();
                const select = document.getElementById("restaurante_id");
                
                restaurantes.forEach(r => {
                    const option = document.createElement("option");
                    option.value = r.id;
                    option.textContent = r.nombre;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error("Error cargando restaurantes:", err);
            }
        }

        function seleccionarRol(rol) {
            rolSeleccionado = rol;
            
            // Actualizar UI
            document.querySelectorAll('.rol-opcion').forEach(el => {
                el.classList.remove('seleccionado');
            });
            document.querySelector(`.rol-opcion[data-rol="${rol}"]`).classList.add('seleccionado');
            
            // Mostrar/ocultar campo de restaurante
            const campoRestaurante = document.getElementById("campo-restaurante");
            if (rol === 'restaurante') {
                campoRestaurante.classList.add('visible');
            } else {
                campoRestaurante.classList.remove('visible');
            }
        }

        async function registrar() {
            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const direccion = document.getElementById("direccion").value;
            const restaurante_id = document.getElementById("restaurante_id").value;
            
            if (!nombre || !email || !password) {
                mostrarMensaje("Por favor completa todos los campos", "error");
                return;
            }
            
            if (rolSeleccionado === 'restaurante' && !restaurante_id) {
                mostrarMensaje("Por favor selecciona un restaurante", "error");
                return;
            }
            
            const datos = {
                nombre: nombre,
                email: email,
                password: password,
                rol: rolSeleccionado,
                direccion: direccion
            };
            
            if (rolSeleccionado === 'restaurante') {
                datos.restaurante_id = parseInt(restaurante_id);
            }
            
            try {
                const res = await fetch(API + "/register.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datos)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    mostrarMensaje("✅ " + data.mensaje + " - Redirigiendo al login...", "exito");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    mostrarMensaje("❌ " + data.error, "error");
                }
            } catch (err) {
                mostrarMensaje("Error de conexión: " + err.message, "error");
            }
        }
        
        function mostrarMensaje(msg, tipo) {
            const msgDiv = document.getElementById("mensaje");
            msgDiv.textContent = msg;
            msgDiv.className = tipo === "error" ? "mensaje-error" : "mensaje-exito";
        }
        
        // Seleccionar cliente por defecto
        seleccionarRol('cliente');
        cargarRestaurantes();
    </script>
</body>
</html>

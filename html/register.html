<!DOCTYPE html>
<html>
<head>
    <title>Registro - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="login.html">Login</a>
            <a href="register.html">Registro</a>
            <a href="restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="form-card">
        <h2>Crear cuenta</h2>
        
        <div class="grupo-rol">
            <label>Tipo de cuenta:</label>
            <div class="rol-opciones">
                <label class="rol-label">
                    <input type="radio" name="rol" value="cliente" checked onchange="cambiarRol('cliente')">
                    👤 Cliente
                </label>
                <label class="rol-label">
                    <input type="radio" name="rol" value="restaurante" onchange="cambiarRol('restaurante')">
                    🏪 Restaurante
                </label>
                <label class="rol-label">
                    <input type="radio" name="rol" value="repartidor" onchange="cambiarRol('repartidor')">
                    🛵 Repartidor
                </label>
            </div>
        </div>
        
        <!-- Campos comunes -->
        <input id="nombre" placeholder="Nombre completo">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">
        <input id="ciudad" placeholder="Ciudad / Pueblo">
        
        <!-- Campos para RESTAURANTE -->
        <div id="campos-restaurante" style="display:none;">
            <input id="nombre_restaurante" placeholder="Nombre del restaurante">
            
            <label>Tipo de comida:</label>
            <div class="tipo-comida-grid">
                <button type="button" class="tipo-btn" data-tipo="Comida Rápida" onclick="seleccionarTipo(this, 'Comida Rápida')">
                    <span class="tipo-icon">🍔</span>
                    <span class="tipo-nombre">Comida Rápida</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="Italiana" onclick="seleccionarTipo(this, 'Italiana')">
                    <span class="tipo-icon">🍕</span>
                    <span class="tipo-nombre">Italiana</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="Española" onclick="seleccionarTipo(this, 'Española')">
                    <span class="tipo-icon">🥘</span>
                    <span class="tipo-nombre">Española</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="China" onclick="seleccionarTipo(this, 'China')">
                    <span class="tipo-icon">🥡</span>
                    <span class="tipo-nombre">China</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="Japonesa" onclick="seleccionarTipo(this, 'Japonesa')">
                    <span class="tipo-icon">🍣</span>
                    <span class="tipo-nombre">Japonesa</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="Mexicana" onclick="seleccionarTipo(this, 'Mexicana')">
                    <span class="tipo-icon">🌮</span>
                    <span class="tipo-nombre">Mexicana</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="Vegetariana" onclick="seleccionarTipo(this, 'Vegetariana')">
                    <span class="tipo-icon">🥗</span>
                    <span class="tipo-nombre">Vegetariana</span>
                </button>
                <button type="button" class="tipo-btn" data-tipo="Otros" onclick="seleccionarTipo(this, 'Otros')">
                    <span class="tipo-icon">🍽️</span>
                    <span class="tipo-nombre">Otros</span>
                </button>
            </div>
            <input type="hidden" id="tipo_comida" value="">
        </div>
        
        <button onclick="registrar()">Registrarse</button>
        <p id="mensaje"></p>
        
        <p style="text-align:center; margin-top:15px;">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </p>
    </div>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let rolSeleccionado = 'cliente';

        function cambiarRol(rol) {
            rolSeleccionado = rol;
            const camposRestaurante = document.getElementById("campos-restaurante");
            
            if (rol === 'restaurante') {
                camposRestaurante.style.display = "block";
            } else {
                camposRestaurante.style.display = "none";
            }
        }

        function seleccionarTipo(boton, tipo) {
            // Remover selección de todos los botones
            document.querySelectorAll('.tipo-btn').forEach(btn => {
                btn.classList.remove('seleccionado');
            });
            // Seleccionar el botón actual
            boton.classList.add('seleccionado');
            // Guardar valor en el campo oculto
            document.getElementById("tipo_comida").value = tipo;
        }

        async function registrar() {
            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const ciudad = document.getElementById("ciudad").value;
            
            if (!nombre || !email || !password || !ciudad) {
                mostrarMensaje("Por favor completa todos los campos obligatorios", "error");
                return;
            }
            
            const datos = {
                nombre: nombre,
                email: email,
                password: password,
                rol: rolSeleccionado,
                ciudad: ciudad
            };
            
            if (rolSeleccionado === 'restaurante') {
                const nombreRestaurante = document.getElementById("nombre_restaurante").value;
                const tipoComida = document.getElementById("tipo_comida").value;
                
                if (!nombreRestaurante) {
                    mostrarMensaje("Por favor ingresa el nombre del restaurante", "error");
                    return;
                }
                if (!tipoComida) {
                    mostrarMensaje("Por favor selecciona el tipo de comida", "error");
                    return;
                }
                datos.nombre_restaurante = nombreRestaurante;
                datos.tipo_comida = tipoComida;
            }
            
            try {
                const res = await fetch(API + "/register.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datos)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    mostrarMensaje("✅ " + data.mensaje, "exito");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    mostrarMensaje("❌ " + data.error, "error");
                }
            } catch (err) {
                mostrarMensaje("Error de conexión: " + err.message, "error");
            }
        }
        
        function mostrarMensaje(msg, tipo) {
            const msgDiv = document.getElementById("mensaje");
            msgDiv.textContent = msg;
            msgDiv.className = tipo === "error" ? "mensaje-error" : "mensaje-exito";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Restaurante - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <div class="topbar">
        <h2>🏪 Panel Restaurante</h2>
        <div>
            <span id="nombreRestaurante" style="margin-right: 20px;"></span>
            <a href="restaurante_panel.html" aria-current="page">Dashboard</a>
            <a href="restaurante_menu.html">🍽️ Mi menú</a>
            <a href="restaurante_pedidos.html">📦 Pedidos</a>
            <a href="restaurante_perfil.html">⚙️ Perfil</a>
            <a href="#" onclick="logout()" aria-label="Cerrar sesión">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="container" id="main-content" tabindex="-1">
        <div class="stats" id="stats"></div>
        
        <h2>📋 Pedidos de mi restaurante</h2>
        <div id="pedidos" aria-live="polite"></div>
    </div>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            localStorage.removeItem("usuario_ciudad");
            localStorage.removeItem("usuario_restaurante_id");
            window.location.href = "login.html";
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function cargarPedidos() {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(API + "/pedidos.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!res.ok) throw new Error("Error cargando pedidos");

                const pedidos = await res.json();
                const div = document.getElementById("pedidos");
                
                if (pedidos.length === 0) {
                    div.innerHTML = "<p>No hay pedidos para mostrar</p>";
                    document.getElementById("stats").innerHTML = `
                        <div class="stat-card"><h3>0</h3><p>Total pedidos</p></div>
                        <div class="stat-card"><h3>0</h3><p>Pendientes</p></div>
                        <div class="stat-card"><h3>0</h3><p>Entregados hoy</p></div>
                    `;
                    return;
                }
                
                const totalPedidos = pedidos.length;
                const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
                const hoy = new Date().toDateString();
                const entregadosHoy = pedidos.filter(p => {
                    return p.estado === 'entregado' && new Date(p.fecha).toDateString() === hoy;
                }).length;
                
                document.getElementById("stats").innerHTML = `
                    <div class="stat-card"><h3>${totalPedidos}</h3><p>Total pedidos</p></div>
                    <div class="stat-card"><h3>${pendientes}</h3><p>Pendientes</p></div>
                    <div class="stat-card"><h3>${entregadosHoy}</h3><p>Entregados hoy</p></div>
                `;

                let html = `
                    <table style="width:100%">
                        <caption style="display: none;">Lista de pedidos del restaurante</caption>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                for (const p of pedidos) {
                    const estadoIcono = getEstadoIcono(p.estado);
                    html += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${escapeHtml(p.cliente)}</p></td>
                            <td>${p.total} €</p></td>
                            <td>${estadoIcono} <span class="estado-${p.estado.replace(' ', '-')}">${p.estado}</span></p></td>
                            <td>${new Date(p.fecha).toLocaleString()}】p</p></td>
                            <td>
                                <select class="select-estado" data-id="${p.id}" data-estado="${p.estado}" aria-label="Cambiar estado del pedido #${p.id}">
                                    <option value="pendiente" ${p.estado === 'pendiente' ? 'selected' : ''}>⏳ Pendiente</option>
                                    <option value="preparando" ${p.estado === 'preparando' ? 'selected' : ''}>👨‍🍳 Preparando</option>
                                    <option value="en camino" ${p.estado === 'en camino' ? 'selected' : ''}>🚚 En camino</option>
                                    <option value="entregado" ${p.estado === 'entregado' ? 'selected' : ''}>✅ Entregado</option>
                                    <option value="cancelado" ${p.estado === 'cancelado' ? 'selected' : ''}>❌ Cancelado</option>
                                </select>
                                <button class="btn-actualizar" onclick="actualizarEstado(${p.id}, this)" aria-label="Actualizar estado del pedido #${p.id}">Actualizar</button>
                            </p></td>
                        </tr>
                    `;
                }
                
                html += `</tbody></table>`;
                div.innerHTML = html;
                
            } catch (err) {
                console.log(err);
                document.getElementById("pedidos").innerHTML = `<p style="color:red" role="alert">Error: ${err.message}</p>`;
            }
        }
        
        function getEstadoIcono(estado) {
            const iconos = {
                'pendiente': '⏳',
                'preparando': '👨‍🍳',
                'en camino': '🚚',
                'entregado': '✅',
                'cancelado': '❌'
            };
            return iconos[estado] || '📋';
        }
        
        async function actualizarEstado(pedidoId, button) {
            const select = button.previousElementSibling;
            const nuevoEstado = select.value;
            const token = localStorage.getItem("token");
            
            try {
                const res = await fetch(API + "/actualizar_estado_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        pedido_id: pedidoId,
                        estado: nuevoEstado
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert("✅ " + data.mensaje);
                    cargarPedidos();
                } else {
                    alert("❌ Error: " + (data.error || "No se pudo actualizar"));
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        }

        const nombreUsuario = localStorage.getItem("usuario_nombre") || "Restaurante";
        document.getElementById("nombreRestaurante").textContent = `Hola, ${nombreUsuario}`;
        
        cargarPedidos();
    </script>
</body>
</html>

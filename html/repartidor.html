<!DOCTYPE html>
<html>
<head>
    <title>Panel Repartidor - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa - Repartidor</h2>
        <div>
            <span>🛵 Hola, <span id="nombreUsuario"></span></span>
            <a href="repartidor.html">📦 Pedidos</a>
            <a href="repartidor_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="container" id="contenedor-principal">
        <!-- Botón buscar pedidos siempre visible -->
        <div style="text-align: right; margin-bottom: 20px;">
            <button id="btnBuscarPedidos" class="btn-buscar" onclick="cargarSiguientePedido()">🔄 Buscar pedidos disponibles</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Buscando pedidos disponibles...</p>
        </div>
        
        <div id="contenido-pedido"></div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const rol = localStorage.getItem("usuario_rol");
        if (rol !== 'repartidor') {
            window.location.href = "login.html";
        }

        document.getElementById("nombreUsuario").textContent = localStorage.getItem("usuario_nombre") || "Repartidor";

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            window.location.href = "login.html";
        }

        let estaCargando = false;
        let pedidoActual = null;

        function mostrarLoading(mostrar) {
            const loadingDiv = document.getElementById("loading");
            if (mostrar) {
                loadingDiv.style.display = "block";
            } else {
                loadingDiv.style.display = "none";
            }
        }

        // Cargar pedido que ya tiene aceptado el repartidor
        async function cargarPedidoAceptado() {
            try {
                const res = await fetch(API + "/pedido_aceptado_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                const data = await res.json();

                if (res.ok && data.id) {
                    mostrarPedidoAceptado(data);
                } else {
                    cargarSiguientePedido();
                }
            } catch (err) {
                console.error(err);
                cargarSiguientePedido();
            }
        }

        function mostrarPedidoAceptado(pedido) {
            const contenedor = document.getElementById("contenido-pedido");
            contenedor.innerHTML = `
                <div class="pedido-aceptado-card">
                    <h3>✅ Pedido en curso</h3>
                    <p><strong>Nº Pedido:</strong> #${pedido.id}</p>
                    <p><strong>Restaurante:</strong> ${pedido.restaurante}</p>
                    <p><strong>Cliente:</strong> ${pedido.cliente}</p>
                    <p><strong>Dirección entrega:</strong> ${pedido.cliente_direccion || "No especificada"}</p>
                    <p><strong>Total:</strong> ${pedido.total ? pedido.total.toFixed(2) : "0"} €</p>
                    <p><strong>Estado:</strong> <span class="estado-${pedido.estado}">${pedido.estado}</span></p>
                    
                    ${pedido.estado === 'en camino' ? `
                        <div class="flex-buttons">
                            <button class="btn-entregar" onclick="marcarEntregado(${pedido.id})">✅ Marcar como entregado</button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        async function marcarEntregado(pedidoId) {
            try {
                const res = await fetch(API + "/actualizar_estado_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        pedido_id: pedidoId,
                        estado: "entregado"
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert("✅ Pedido marcado como entregado");
                    cargarPedidoAceptado();
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        }

        async function cargarSiguientePedido() {
            if (estaCargando) return;
            estaCargando = true;
            mostrarLoading(true);

            try {
                const res = await fetch(API + "/pedidos_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Error cargando pedido");
                }

                if (!data.id && !data.pedido) {
                    mostrarSinPedidos();
                    estaCargando = false;
                    mostrarLoading(false);
                    return;
                }

                const pedido = data.pedido || data;
                pedidoActual = pedido;
                mostrarPedidoDisponible(pedido);
                estaCargando = false;
                mostrarLoading(false);

            } catch (err) {
                console.error(err);
                mostrarError(err.message);
                estaCargando = false;
                mostrarLoading(false);
            }
        }

        function mostrarPedidoDisponible(pedido) {
            const contenedor = document.getElementById("contenido-pedido");
            contenedor.innerHTML = `
                <div class="pedido-card">
                    <h3>🍽️ Nuevo pedido disponible</h3>
                    <p><strong>Restaurante:</strong> ${pedido.restaurante || "No especificado"}</p>
                    <p><strong>Cliente:</strong> ${pedido.cliente || "No especificado"}</p>
                    <p><strong>Dirección entrega:</strong> ${pedido.cliente_direccion || "No especificada"}</p>
                    <p><strong>Total del pedido:</strong> ${pedido.total ? pedido.total.toFixed(2) : "0"} €</p>
                    <p><strong>Ciudad:</strong> ${pedido.ciudad || "General"}</p>
                    
                    <div class="flex-buttons">
                        <button class="btn-aceptar" onclick="aceptarPedido(${pedido.id})">✅ Aceptar pedido</button>
                        <button class="btn-rechazar" onclick="rechazarPedido(${pedido.id})">❌ Rechazar pedido</button>
                    </div>
                </div>
            `;
        }

        function mostrarSinPedidos() {
            const contenedor = document.getElementById("contenido-pedido");
            contenedor.innerHTML = `
                <div class="confirmacion-card">
                    <h3>📭 No hay pedidos</h3>
                    <p>No hay pedidos disponibles en tu ciudad en este momento.</p>
                    <p>Haz clic en "Buscar pedidos disponibles" para comprobar de nuevo.</p>
                </div>
            `;
        }

        function mostrarError(mensaje) {
            const contenedor = document.getElementById("contenido-pedido");
            contenedor.innerHTML = `
                <div class="confirmacion-card">
                    <h3 class="error">❌ Error</h3>
                    <p>${mensaje}</p>
                    <p>Haz clic en "Buscar pedidos disponibles" para intentar de nuevo.</p>
                </div>
            `;
        }

        async function aceptarPedido(pedidoId) {
            try {
                const res = await fetch(API + "/aceptar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });

                const data = await res.json();

                if (res.ok) {
                    cargarPedidoAceptado();
                } else {
                    alert("❌ Error: " + data.error);
                    cargarSiguientePedido();
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
                cargarSiguientePedido();
            }
        }

        async function rechazarPedido(pedidoId) {
            try {
                const res = await fetch(API + "/rechazar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });

                if (res.ok) {
                    mostrarLoading(true);
                    setTimeout(() => {
                        cargarSiguientePedido();
                    }, 500);
                } else {
                    const data = await res.json();
                    alert("❌ Error: " + data.error);
                    cargarSiguientePedido();
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
                cargarSiguientePedido();
            }
        }

        // Cargar pedido aceptado al iniciar
        cargarPedidoAceptado();
    </script>
</body>
</html>

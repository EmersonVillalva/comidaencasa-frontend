<!DOCTYPE html>
<html>
<head>
    <title>Login - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="login.html">Login</a>
            <a href="register.html">Registro</a>
            <a href="restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="form-card">
        <h2>Iniciar sesión</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <p id="error"></p>
        
        <p style="text-align:center; margin-top:15px;">
            ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </p>
    </div>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                document.getElementById("error").textContent = "Completa todos los campos";
                return;
            }

            try {
                const res = await fetch(API + "/login.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || "Login incorrecto");

                // Guardar datos en localStorage
                localStorage.setItem("token", data.token);
                localStorage.setItem("usuario_rol", data.usuario.rol);
                localStorage.setItem("usuario_nombre", data.usuario.nombre);
                localStorage.setItem("usuario_email", data.usuario.email);
                
                // Redirigir según el rol (usando los nombres de archivo existentes)
                if (data.usuario.rol === 'restaurante') {
                    window.location.href = "restaurante_panel.html";
                } else if (data.usuario.rol === 'repartidor') {
                    window.location.href = "repartidor.html";
                } else {
                    window.location.href = "cliente_inicio.html";
                }
                
            } catch (err) {
                document.getElementById("error").textContent = err.message;
            }
        }
    </script>
</body>
</html>

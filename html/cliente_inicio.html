<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- Skip to content link -->
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <span aria-label="Usuario">👤 Hola, <span id="nombreUsuario"></span></span>
            <a href="cliente_inicio.html" aria-current="page">🏠 Inicio</a>
            <a href="restaurantes.html">🍽️ Restaurantes</a>
            <a href="cliente_pedidos.html">📦 Mis pedidos</a>
            <a href="cliente_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()" style="color: #dc3545;" aria-label="Cerrar sesión">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="hero">
        <h1>Bienvenido, <span id="heroNombre"></span></h1>
        <p>¿Qué te apetece comer hoy en <span id="ciudadUsuario"></span>?</p>
        <div class="search-box">
            <label for="buscador" style="display: none;">Buscar restaurante</label>
            <input id="buscador" type="text" placeholder="Buscar restaurante..." aria-label="Buscar restaurantes" onkeyup="buscarRestaurante()">
        </div>
    </div>

    <div class="container" id="main-content" tabindex="-1">
        <h2>Restaurantes en tu ciudad</h2>
        <div class="grid" id="restaurantes" aria-live="polite"></div>
        <div id="error" role="alert"></div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let restaurantes = [];

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const nombre = localStorage.getItem("usuario_nombre") || "Usuario";
        const ciudad = localStorage.getItem("usuario_ciudad") || "General";
        
        document.getElementById("nombreUsuario").textContent = nombre;
        document.getElementById("heroNombre").textContent = nombre;
        document.getElementById("ciudadUsuario").textContent = ciudad;

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            localStorage.removeItem("usuario_ciudad");
            window.location.href = "login.html";
        }

        function getIconoTipoComida(tipo) {
            const iconos = {
                "Comida Rápida": "🍔",
                "Italiana": "🍕",
                "Española": "🥘",
                "China": "🥡",
                "Japonesa": "🍣",
                "Mexicana": "🌮",
                "Vegetariana": "🥗",
                "Otros": "🍽️"
            };
            return iconos[tipo] || "🍽️";
        }

        async function cargarRestaurantes() {
            const errorDiv = document.getElementById("error");
            errorDiv.innerHTML = "";
            
            try {
                const res = await fetch(API + "/restaurantes.php?ciudad=" + encodeURIComponent(ciudad) + "&token=" + encodeURIComponent(token));
                if (!res.ok) throw new Error("Error cargando restaurantes");
                restaurantes = await res.json();
                mostrarRestaurantes(restaurantes);
                
                if (restaurantes.length === 0) {
                    errorDiv.innerHTML = "No hay restaurantes disponibles en tu ciudad.";
                    errorDiv.setAttribute("role", "alert");
                }
            } catch (err) {
                errorDiv.innerHTML = err.message;
                errorDiv.setAttribute("role", "alert");
            }
        }

        function mostrarRestaurantes(lista) {
            const cont = document.getElementById("restaurantes");
            cont.innerHTML = "";
            
            if (lista.length === 0) {
                cont.innerHTML = "<p>No se encontraron restaurantes en tu ciudad</p>";
                return;
            }
            
            lista.forEach(r => {
                const card = document.createElement("div");
                card.className = "card";
                const icono = getIconoTipoComida(r.tipo_comida);
                
                card.innerHTML = `
                    <div class="card-content">
                        <h3>${icono} ${escapeHtml(r.nombre)}</h3>
                        <p>${escapeHtml(r.descripcion) || "Restaurante con excelente comida"}</p>
                        ${r.ciudad ? `<p><small>📍 ${escapeHtml(r.ciudad)}</small></p>` : ''}
                        ${r.tipo_comida && r.tipo_comida !== 'Otros' ? `<p><small>🍽️ ${escapeHtml(r.tipo_comida)}</small></p>` : ''}
                        <button onclick="verMenu(${r.id})" aria-label="Ver menú de ${escapeHtml(r.nombre)}">Ver menú</button>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function buscarRestaurante() {
            const texto = document.getElementById("buscador").value.toLowerCase();
            const filtrados = restaurantes.filter(r => r.nombre.toLowerCase().includes(texto));
            mostrarRestaurantes(filtrados);
        }

        function verMenu(id) {
            window.location.href = "restaurante.html?id=" + id;
        }

        cargarRestaurantes();
    </script>
</body>
</html>

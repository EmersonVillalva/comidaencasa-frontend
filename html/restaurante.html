<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <span aria-label="Usuario">👤 Hola, <span id="nombreUsuario"></span></span>
            <a href="cliente_inicio.html">🏠 Inicio</a>
            <a href="restaurantes.html">🍽️ Restaurantes</a>
            <a href="cliente_pedidos.html">📦 Mis pedidos</a>
            <a href="cliente_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()" style="color: #dc3545;" aria-label="Cerrar sesión">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="contenedor-con-carrito" id="main-content" tabindex="-1">
        <div class="menu-section">
            <h2>Menú</h2>
            <div class="grid" id="menu"></div>
        </div>
        <div class="carrito-section">
            <h3>🛒 Mi pedido</h3>
            <div id="carrito-contenido" aria-live="polite" aria-label="Carrito de compras">
                <div class="carrito-vacio">No hay productos en el carrito</div>
            </div>
        </div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        const params = new URLSearchParams(window.location.search);
        const restauranteId = params.get("id");
        
        let carrito = [];

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        document.getElementById("nombreUsuario").textContent = localStorage.getItem("usuario_nombre") || "Usuario";

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            window.location.href = "login.html";
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function cargarMenu() {
            try {
                const res = await fetch(API + "/menu.php?id=" + restauranteId);
                const platos = await res.json();
                const menuDiv = document.getElementById("menu");
                menuDiv.innerHTML = "";

                if (platos.length === 0) {
                    menuDiv.innerHTML = "<p>No hay platos disponibles en este restaurante.</p>";
                    return;
                }

                platos.forEach(p => {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `
                        <div class="card-content">
                            <h3>🍽️ ${escapeHtml(p.nombre)}</h3>
                            <p>${escapeHtml(p.descripcion) || "Delicioso plato"}</p>
                            <p><strong>${parseFloat(p.precio).toFixed(2)} €</strong></p>
                            <button class="btn-agregar" onclick="agregarAlCarrito(${p.id}, '${escapeHtml(p.nombre)}', ${p.precio})" aria-label="Agregar ${escapeHtml(p.nombre)} al carrito">Agregar al carrito</button>
                        </div>
                    `;
                    menuDiv.appendChild(div);
                });
            } catch (err) {
                console.error(err);
                document.getElementById("menu").innerHTML = `<p style="color:red" role="alert">Error al cargar el menú: ${err.message}</p>`;
            }
        }

        function agregarAlCarrito(id, nombre, precio) {
            const existe = carrito.find(item => item.id === id);
            if (existe) {
                existe.cantidad++;
            } else {
                carrito.push({ id, nombre, precio: parseFloat(precio), cantidad: 1 });
            }
            actualizarCarrito();
            anunciarCarrito(`Se agregó ${nombre} al carrito`);
        }

        function eliminarDelCarrito(id) {
            const index = carrito.findIndex(item => item.id === id);
            if (index !== -1) {
                const nombre = carrito[index].nombre;
                if (carrito[index].cantidad > 1) {
                    carrito[index].cantidad--;
                    anunciarCarrito(`Se eliminó una unidad de ${nombre}`);
                } else {
                    carrito.splice(index, 1);
                    anunciarCarrito(`${nombre} eliminado del carrito`);
                }
            }
            actualizarCarrito();
        }

        function anunciarCarrito(mensaje) {
            const carritoDiv = document.getElementById("carrito-contenido");
            const anuncio = document.createElement("div");
            anuncio.setAttribute("role", "status");
            anuncio.setAttribute("aria-live", "polite");
            anuncio.className = "mensaje-exito";
            anuncio.style.position = "absolute";
            anuncio.style.width = "1px";
            anuncio.style.height = "1px";
            anuncio.style.padding = "0";
            anuncio.style.margin = "-1px";
            anuncio.style.overflow = "hidden";
            anuncio.style.clip = "rect(0,0,0,0)";
            anuncio.style.border = "0";
            anuncio.textContent = mensaje;
            document.body.appendChild(anuncio);
            setTimeout(() => anuncio.remove(), 3000);
        }

        function actualizarCarrito() {
            const carritoDiv = document.getElementById("carrito-contenido");
            
            if (carrito.length === 0) {
                carritoDiv.innerHTML = '<div class="carrito-vacio">No hay productos en el carrito</div>';
                return;
            }

            let html = '';
            let total = 0;
            
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                html += `
                    <div class="carrito-item">
                        <div class="carrito-item-info">
                            <h4>${escapeHtml(item.nombre)}</h4>
                            <p>${item.precio.toFixed(2)} €</p>
                        </div>
                        <div class="carrito-item-cantidad">
                            <button onclick="eliminarDelCarrito(${item.id})" aria-label="Disminuir cantidad de ${escapeHtml(item.nombre)}">-</button>
                            <span>${item.cantidad}</span>
                            <button onclick="agregarAlCarrito(${item.id}, '${escapeHtml(item.nombre)}', ${item.precio})" aria-label="Aumentar cantidad de ${escapeHtml(item.nombre)}">+</button>
                        </div>
                        <div class="carrito-item-precio">${subtotal.toFixed(2)} €</div>
                    </div>
                `;
            });
            
            html += `<div class="carrito-total">Total: ${total.toFixed(2)} €</div>`;
            html += `<button class="btn-confirmar" onclick="confirmarPedido()" aria-label="Confirmar pedido por ${total.toFixed(2)} euros">Confirmar pedido</button>`;
            
            carritoDiv.innerHTML = html;
        }

        async function confirmarPedido() {
            const token = localStorage.getItem("token");
            
            if (!token) {
                alert("Debes iniciar sesión");
                window.location.href = "login.html";
                return;
            }
            
            if (carrito.length === 0) {
                alert("El carrito está vacío");
                return;
            }
            
            const total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            const items = carrito.map(item => ({
                menu_id: item.id,
                cantidad: item.cantidad,
                subtotal: parseFloat((item.precio * item.cantidad).toFixed(2))
            }));
            
            try {
                const res = await fetch(API + "/pedido_crear.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        restaurante_id: parseInt(restauranteId),
                        total: parseFloat(total.toFixed(2)),
                        items: items
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert(`Pedido realizado con éxito. Nº: ${data.pedido_id}`);
                    carrito = [];
                    actualizarCarrito();
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        }

        cargarMenu();
    </script>
</body>
</html>

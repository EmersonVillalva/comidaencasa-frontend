<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComidaEnCasa - Pide comida a domicilio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="html/login.html">Login</a>
            <a href="html/register.html">Registro</a>
            <a href="html/restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="hero">
        <h1>Pide comida a domicilio</h1>
        <p>Los mejores restaurantes a un clic de distancia</p>
        <div class="search-box">
            <input id="buscador" type="text" placeholder="Buscar restaurante..." onkeyup="buscarRestaurante()">
        </div>
    </div>

    <div class="container">
        <h2>Restaurantes destacados</h2>
        <div class="grid" id="restaurantes"></div>
        <p id="error"></p>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let restaurantes = [];

        function getIconoTipoComida(tipo) {
            const iconos = {
                "Comida Rápida": "🍔",
                "Italiana": "🍕",
                "Española": "🥘",
                "China": "🥡",
                "Japonesa": "🍣",
                "Mexicana": "🌮",
                "Vegetariana": "🥗",
                "Otros": "🍽️"
            };
            return iconos[tipo] || "🍽️";
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function cargarRestaurantes() {
            try {
                const res = await fetch(API + "/restaurantes.php");
                if (!res.ok) throw new Error("Error cargando restaurantes");
                restaurantes = await res.json();
                mostrarRestaurantes(restaurantes);
            } catch (err) {
                document.getElementById("error").textContent = err.message;
            }
        }

        function mostrarRestaurantes(lista) {
            const cont = document.getElementById("restaurantes");
            cont.innerHTML = "";
            
            if (lista.length === 0) {
                cont.innerHTML = "<p>No hay restaurantes disponibles</p>";
                return;
            }
            
            lista.forEach(r => {
                const card = document.createElement("div");
                card.className = "card";
                const icono = getIconoTipoComida(r.tipo_comida);
                
                card.innerHTML = `
                    <div class="card-content">
                        <h3>${icono} ${escapeHtml(r.nombre)}</h3>
                        <p>${escapeHtml(r.descripcion) || "Restaurante con excelente comida"}</p>
                        ${r.ciudad ? `<p><small>📍 ${escapeHtml(r.ciudad)}</small></p>` : ''}
                        ${r.tipo_comida && r.tipo_comida !== 'Otros' ? `<p><small>🍽️ ${escapeHtml(r.tipo_comida)}</small></p>` : ''}
                        <button onclick="verMenu(${r.id})">Ver menú</button>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function buscarRestaurante() {
            const texto = document.getElementById("buscador").value.toLowerCase();
            const filtrados = restaurantes.filter(r => r.nombre.toLowerCase().includes(texto));
            mostrarRestaurantes(filtrados);
        }

        function verMenu(id) {
            window.location.href = "html/restaurante.html?id=" + id;
        }

        cargarRestaurantes();
    </script>
</body>
</html>

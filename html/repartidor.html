<!DOCTYPE html>
<html>
<head>
    <title>Panel Repartidor - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa - Repartidor</h2>
        <div>
            <span style="margin-right: 15px;">🛵 Hola, <span id="nombreUsuario"></span></span>
            <a href="repartidor.html">📦 Mis pedidos</a>
            <a href="repartidor_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()" style="color: #dc3545;">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="container">
        <h2>📦 Pedidos disponibles</h2>
        <div id="pedidos"></div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const rol = localStorage.getItem("usuario_rol");
        if (rol !== 'repartidor') {
            window.location.href = "login.html";
        }

        document.getElementById("nombreUsuario").textContent = localStorage.getItem("usuario_nombre") || "Repartidor";

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            window.location.href = "login.html";
        }

        async function cargarPedidos() {
            try {
                const res = await fetch(API + "/pedidos_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!res.ok) throw new Error("Error cargando pedidos");

                const data = await res.json();
                const div = document.getElementById("pedidos");
                
                // La respuesta es un objeto con 'pedido' o un array
                let pedido = null;
                
                if (Array.isArray(data)) {
                    // Si es array, tomar el primero
                    pedido = data.length > 0 ? data[0] : null;
                } else if (data.pedido) {
                    // Si es objeto con propiedad pedido
                    pedido = data.pedido;
                } else if (data.id) {
                    // Si es directamente el pedido
                    pedido = data;
                }
                
                if (!pedido) {
                    div.innerHTML = "<p>No hay pedidos disponibles en tu ciudad.</p>";
                    return;
                }

                div.innerHTML = "";
                
                // Mostrar el pedido como tarjeta
                const card = document.createElement("div");
                card.className = "pedido-card";
                card.innerHTML = `
                    <h3>🍽️ Nuevo pedido disponible</h3>
                    <p><strong>Restaurante:</strong> ${pedido.restaurante || pedido.restaurante_nombre || "No especificado"}</p>
                    <p><strong>Cliente:</strong> ${pedido.cliente || "No especificado"}</p>
                    <p><strong>Dirección entrega:</strong> ${pedido.cliente_direccion || pedido.direccion || "No especificada"}</p>
                    <p><strong>Total del pedido:</strong> ${pedido.total ? pedido.total.toFixed(2) : "0"} €</p>
                    <p><strong>Ciudad:</strong> ${pedido.ciudad || "General"}</p>
                    
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button class="btn-aceptar" onclick="aceptarPedido(${pedido.id})" style="background: #28a745; flex: 1;">✅ Aceptar pedido</button>
                        <button class="btn-rechazar" onclick="rechazarPedido(${pedido.id})" style="background: #dc3545; flex: 1;">❌ Rechazar pedido</button>
                    </div>
                `;
                div.appendChild(card);
                
            } catch (err) {
                console.log(err);
                document.getElementById("pedidos").innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
            }
        }

        async function aceptarPedido(pedidoId) {
            try {
                const res = await fetch(API + "/aceptar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert("✅ " + data.mensaje + " - Pedido #" + data.pedido_id);
                    cargarPedidos();
                } else {
                    alert("❌ Error: " + data.error);
                    cargarPedidos();
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
                cargarPedidos();
            }
        }

        async function rechazarPedido(pedidoId) {
            try {
                const res = await fetch(API + "/rechazar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });
                
                if (res.ok) {
                    alert("❌ Pedido rechazado");
                    cargarPedidos();
                } else {
                    const data = await res.json();
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
                cargarPedidos();
            }
        }

        cargarPedidos();
    </script>
</body>
</html>

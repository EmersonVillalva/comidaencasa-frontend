<!DOCTYPE html>
<html>
<head>
    <title>Registro - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
    
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="login.html">Login</a>
            <a href="register.html">Registro</a>
            <a href="restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="form-card">
        <h2>Crear cuenta</h2>
        
        <div class="rol-selector">
            <div class="rol-opcion" data-rol="cliente" onclick="seleccionarRol('cliente')">
                <h3>👤 Cliente</h3>
                <p>Pide comida a domicilio</p>
            </div>
            <div class="rol-opcion" data-rol="restaurante" onclick="seleccionarRol('restaurante')">
                <h3>🏪 Restaurante</h3>
                <p>Vende tu comida</p>
            </div>
            <div class="rol-opcion" data-rol="repartidor" onclick="seleccionarRol('repartidor')">
                <h3>🛵 Repartidor</h3>
                <p>Reparte pedidos</p>
            </div>
        </div>
        
        <!-- Campos comunes -->
        <input id="nombre" placeholder="Nombre completo">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">
        <input id="direccion" placeholder="Dirección (opcional)">
        
        <!-- Campos extra para RESTAURANTE -->
        <div id="campos-restaurante" class="campo-extra">
            <h3>📋 Datos del restaurante</h3>
            <input id="nombre_restaurante" placeholder="Nombre del restaurante">
            <textarea id="descripcion_restaurante" rows="3" placeholder="Descripción del restaurante (opcional)"></textarea>
        </div>
        
        <!-- Campos extra para REPARTIDOR -->
        <div id="campos-repartidor" class="campo-extra">
            <h3>🛵 Datos del repartidor</h3>
            <input id="vehiculo" placeholder="Tipo de vehículo (opcional)">
            <input id="licencia" placeholder="Número de licencia (opcional)">
        </div>
        
        <button onclick="registrar()">Registrarse</button>
        <p id="mensaje"></p>
        
        <p style="text-align:center; margin-top:15px;">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </p>
    </div>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let rolSeleccionado = 'cliente';

        function seleccionarRol(rol) {
            rolSeleccionado = rol;
            
            // Actualizar UI
            document.querySelectorAll('.rol-opcion').forEach(el => {
                el.classList.remove('seleccionado');
            });
            document.querySelector(`.rol-opcion[data-rol="${rol}"]`).classList.add('seleccionado');
            
            // Ocultar todos los campos extra
            document.getElementById("campos-restaurante").classList.remove('visible');
            document.getElementById("campos-repartidor").classList.remove('visible');
            
            // Mostrar campos según rol
            if (rol === 'restaurante') {
                document.getElementById("campos-restaurante").classList.add('visible');
            } else if (rol === 'repartidor') {
                document.getElementById("campos-repartidor").classList.add('visible');
            }
        }

        async function registrar() {
            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const direccion = document.getElementById("direccion").value;
            
            if (!nombre || !email || !password) {
                mostrarMensaje("Por favor completa todos los campos obligatorios", "error");
                return;
            }
            
            const datos = {
                nombre: nombre,
                email: email,
                password: password,
                rol: rolSeleccionado,
                direccion: direccion
            };
            
            // Agregar datos específicos según rol
            if (rolSeleccionado === 'restaurante') {
                const nombreRestaurante = document.getElementById("nombre_restaurante").value;
                if (!nombreRestaurante) {
                    mostrarMensaje("Por favor ingresa el nombre del restaurante", "error");
                    return;
                }
                datos.nombre_restaurante = nombreRestaurante;
                datos.descripcion_restaurante = document.getElementById("descripcion_restaurante").value;
            }
            
            if (rolSeleccionado === 'repartidor') {
                datos.vehiculo = document.getElementById("vehiculo").value;
                datos.licencia = document.getElementById("licencia").value;
            }
            
            try {
                const res = await fetch(API + "/register.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datos)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    let mensaje = "✅ " + data.mensaje;
                    if (rolSeleccionado === 'restaurante') {
                        mensaje += "\n\nAhora puedes iniciar sesión con tu cuenta de restaurante.";
                    }
                    mostrarMensaje(mensaje, "exito");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 3000);
                } else {
                    mostrarMensaje("❌ " + data.error, "error");
                }
            } catch (err) {
                mostrarMensaje("Error de conexión: " + err.message, "error");
            }
        }
        
        function mostrarMensaje(msg, tipo) {
            const msgDiv = document.getElementById("mensaje");
            msgDiv.textContent = msg;
            msgDiv.className = tipo === "error" ? "mensaje-error" : "mensaje-exito";
        }
        
        // Seleccionar cliente por defecto
        seleccionarRol('cliente');
    </script>
</body>
</html>

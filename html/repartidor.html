<!DOCTYPE html>
<html>
<head>
    <title>Panel Repartidor - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa - Repartidor</h2>
        <div>
            <span>🛵 Hola, <span id="nombreUsuario"></span></span>
            <a href="repartidor.html">📦 Pedidos</a>
            <a href="repartidor_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="container" id="contenedor-principal">
        <!-- Botón buscar pedidos siempre visible -->
        <div style="text-align: right; margin-bottom: 20px;">
            <button id="btnBuscarPedidos" class="btn-buscar" onclick="buscarNuevosPedidos()">🔄 Buscar pedidos disponibles</button>
        </div>

        <!-- Sección de pedidos disponibles (nuevos) -->
        <div id="seccion-disponibles" style="display: none;">
            <h2>📦 Pedidos disponibles</h2>
            <div id="pedidos-disponibles"></div>
        </div>

        <!-- Sección de pedidos en curso (aceptados) -->
        <div id="seccion-en-curso">
            <h2>✅ Mis pedidos en curso</h2>
            <div id="pedidos-en-curso"></div>
        </div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const rol = localStorage.getItem("usuario_rol");
        if (rol !== 'repartidor') {
            window.location.href = "login.html";
        }

        document.getElementById("nombreUsuario").textContent = localStorage.getItem("usuario_nombre") || "Repartidor";

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            window.location.href = "login.html";
        }

        let estaCargando = false;

        // Cargar todos los pedidos aceptados por el repartidor
        async function cargarPedidosEnCurso() {
            try {
                const res = await fetch(API + "/pedidos_aceptados_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                const pedidos = await res.json();
                const contenedor = document.getElementById("pedidos-en-curso");
                
                if (!res.ok) {
                    contenedor.innerHTML = `<p class="error-mensaje">Error: ${pedidos.error || "No se pudieron cargar los pedidos"}</p>`;
                    return;
                }

                if (pedidos.length === 0) {
                    contenedor.innerHTML = '<p class="sin-pedidos">No tienes pedidos en curso actualmente.</p>';
                    return;
                }

                contenedor.innerHTML = "";
                
                pedidos.forEach(pedido => {
                    const card = document.createElement("div");
                    card.className = "pedido-aceptado-card";
                    card.innerHTML = `
                        <h3>📦 Pedido #${pedido.id}</h3>
                        <p><strong>Restaurante:</strong> ${pedido.restaurante}</p>
                        <p><strong>Cliente:</strong> ${pedido.cliente}</p>
                        <p><strong>Dirección entrega:</strong> ${pedido.cliente_direccion || "No especificada"}</p>
                        <p><strong>Total:</strong> ${pedido.total ? pedido.total.toFixed(2) : "0"} €</p>
                        <p><strong>Estado:</strong> <span class="estado-${pedido.estado}">${pedido.estado}</span></p>
                        
                        ${pedido.estado === 'en camino' ? `
                            <div class="flex-buttons">
                                <button class="btn-entregar" onclick="marcarEntregado(${pedido.id})">✅ Marcar como entregado</button>
                            </div>
                        ` : ''}
                    `;
                    contenedor.appendChild(card);
                });
                
            } catch (err) {
                console.error(err);
                document.getElementById("pedidos-en-curso").innerHTML = `<p class="error-mensaje">Error al cargar pedidos: ${err.message}</p>`;
            }
        }

        async function marcarEntregado(pedidoId) {
            try {
                const res = await fetch(API + "/actualizar_estado_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        pedido_id: pedidoId,
                        estado: "entregado"
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert("✅ Pedido marcado como entregado");
                    cargarPedidosEnCurso();
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        }

        // Buscar nuevos pedidos disponibles
        async function buscarNuevosPedidos() {
            if (estaCargando) return;
            estaCargando = true;
            
            const seccionDisponibles = document.getElementById("seccion-disponibles");
            const pedidosDiv = document.getElementById("pedidos-disponibles");
            
            seccionDisponibles.style.display = "block";
            pedidosDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Buscando pedidos disponibles...</p></div>';

            try {
                const res = await fetch(API + "/pedidos_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Error cargando pedido");
                }

                // Verificar si hay pedidos disponibles
                if (!data.pedidos || data.pedidos.length === 0) {
                    pedidosDiv.innerHTML = '<p class="sin-pedidos">No hay pedidos disponibles en tu ciudad en este momento.</p>';
                    estaCargando = false;
                    return;
                }

                mostrarPedidosDisponibles(data.pedidos);
                estaCargando = false;

            } catch (err) {
                console.error(err);
                pedidosDiv.innerHTML = `<p class="error-mensaje">Error: ${err.message}</p>`;
                estaCargando = false;
            }
        }

        function mostrarPedidosDisponibles(pedidos) {
            const pedidosDiv = document.getElementById("pedidos-disponibles");
            pedidosDiv.innerHTML = "";
            
            pedidos.forEach(pedido => {
                const card = document.createElement("div");
                card.className = "pedido-card";
                card.innerHTML = `
                    <h3>🍽️ ${pedido.restaurante}</h3>
                    <p><strong>Cliente:</strong> ${pedido.cliente}</p>
                    <p><strong>Dirección entrega:</strong> ${pedido.cliente_direccion || "No especificada"}</p>
                    <p><strong>Total:</strong> ${pedido.total ? pedido.total.toFixed(2) : "0"} €</p>
                    <p><strong>Ciudad:</strong> ${pedido.ciudad || "General"}</p>
                    <p><strong>Distancia:</strong> ${pedido.distancia || "No calculada"}</p>
                    
                    <div class="flex-buttons">
                        <button class="btn-aceptar" onclick="aceptarPedido(${pedido.id})">✅ Aceptar pedido</button>
                        <button class="btn-rechazar" onclick="rechazarPedido(${pedido.id}, this)">❌ Rechazar pedido</button>
                    </div>
                `;
                pedidosDiv.appendChild(card);
            });
        }

        async function aceptarPedido(pedidoId) {
            try {
                const res = await fetch(API + "/aceptar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Pedido aceptado correctamente");
                    // Ocultar sección de disponibles
                    document.getElementById("seccion-disponibles").style.display = "none";
                    // Recargar pedidos en curso
                    cargarPedidosEnCurso();
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        }

        async function rechazarPedido(pedidoId, boton) {
            try {
                const res = await fetch(API + "/rechazar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });

                if (res.ok) {
                    // Eliminar el pedido de la lista visualmente
                    const card = boton.closest('.pedido-card');
                    if (card) {
                        card.remove();
                    }
                    
                    // Verificar si quedan pedidos disponibles
                    const pedidosRestantes = document.querySelectorAll('#pedidos-disponibles .pedido-card');
                    if (pedidosRestantes.length === 0) {
                        document.getElementById("pedidos-disponibles").innerHTML = '<p class="sin-pedidos">No hay más pedidos disponibles en tu ciudad en este momento.</p>';
                    }
                } else {
                    const data = await res.json();
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        }

        // Cargar pedidos en curso al iniciar
        cargarPedidosEnCurso();
    </script>
</body>
</html>

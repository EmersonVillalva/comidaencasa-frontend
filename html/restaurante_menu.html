<!DOCTYPE html>
<html>
<head>
    <title>Panel Repartidor - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa - Repartidor</h2>
        <div>
            <span>🛵 Hola, <span id="nombreUsuario"></span></span>
            <a href="repartidor_inicio.html">📦 Pedidos</a>
            <a href="repartidor_perfil.html">⚙️ Perfil</a>
            <a href="#" onclick="logout()" style="color: #dc3545;">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="container" id="contenedor-pedido">
        <div id="cargando" style="text-align: center; padding: 40px;">
            <p>Buscando pedidos disponibles...</p>
        </div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const rol = localStorage.getItem("usuario_rol");
        if (rol !== 'repartidor') {
            window.location.href = "login.html";
        }

        document.getElementById("nombreUsuario").textContent = localStorage.getItem("usuario_nombre") || "Repartidor";

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            window.location.href = "login.html";
        }

        let pedidoActual = null;
        let estaCargando = false;

        async function cargarSiguientePedido() {
            if (estaCargando) return;
            estaCargando = true;

            try {
                const res = await fetch(API + "/pedidos_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                const data = await res.json();
                console.log("Respuesta del servidor:", data);

                if (data.pedido) {
                    pedidoActual = data.pedido;
                    mostrarPedido(pedidoActual);
                } else {
                    mostrarMensaje(data.mensaje || "No hay pedidos disponibles en tu ciudad");
                }
                estaCargando = false;

            } catch (err) {
                console.error("Error:", err);
                mostrarMensaje("Error al cargar pedido: " + err.message);
                estaCargando = false;
            }
        }

        function mostrarPedido(pedido) {
            const contenedor = document.getElementById("contenedor-pedido");
            contenedor.innerHTML = `
                <div class="pedido-card" style="max-width: 500px; margin: 0 auto;">
                    <h3>🍽️ Nuevo pedido disponible</h3>
                    <p><strong>Restaurante:</strong> ${pedido.restaurante}</p>
                    <p><strong>Cliente:</strong> ${pedido.cliente}</p>
                    <p><strong>Dirección entrega:</strong> ${pedido.cliente_direccion || "No especificada"}</p>
                    <p><strong>Total del pedido:</strong> ${pedido.total ? pedido.total.toFixed(2) : "0"} €</p>
                    <p><strong>Ciudad:</strong> ${pedido.ciudad || "General"}</p>
                    
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button onclick="aceptarPedido()" style="background: #28a745; flex: 1;">✅ Aceptar pedido</button>
                        <button onclick="rechazarPedido()" style="background: #dc3545; flex: 1;">❌ Rechazar pedido</button>
                    </div>
                </div>
            `;
        }

        function mostrarMensaje(mensaje) {
            const contenedor = document.getElementById("contenedor-pedido");
            contenedor.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <p>📭 ${mensaje}</p>
                    <button onclick="cargarSiguientePedido()" style="margin-top: 20px;">🔄 Buscar pedidos</button>
                </div>
            `;
        }

        async function aceptarPedido() {
            if (!pedidoActual) return;

            try {
                const res = await fetch(API + "/aceptar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoActual.id })
                });

                const data = await res.json();

                if (res.ok) {
                    const contenedor = document.getElementById("contenedor-pedido");
                    contenedor.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <p>✅ ${data.mensaje}</p>
                            <p>Pedido #${data.pedido_id} aceptado</p>
                            <p>Dirígete al restaurante a recoger el pedido.</p>
                            <button onclick="cargarSiguientePedido()" style="margin-top: 20px;">🔄 Buscar siguiente pedido</button>
                        </div>
                    `;
                    pedidoActual = null;
                } else {
                    alert("Error: " + data.error);
                    cargarSiguientePedido();
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
                cargarSiguientePedido();
            }
        }

        async function rechazarPedido() {
            if (!pedidoActual) return;

            try {
                const res = await fetch(API + "/rechazar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoActual.id })
                });

                if (res.ok) {
                    mostrarMensaje("Pedido rechazado, buscando siguiente...");
                    pedidoActual = null;
                    setTimeout(() => {
                        cargarSiguientePedido();
                    }, 1000);
                } else {
                    const data = await res.json();
                    alert("Error: " + data.error);
                    cargarSiguientePedido();
                }
            } catch (err) {
                alert("Error al rechazar pedido");
                cargarSiguientePedido();
            }
        }

        // Cargar el primer pedido al iniciar
        cargarSiguientePedido();
    </script>
</body>
</html>

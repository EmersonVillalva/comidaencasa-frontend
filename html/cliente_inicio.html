<!DOCTYPE html>
<html>
<head>
    <title>Inicio - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <span style="margin-right: 15px;">👤 Hola, <span id="nombreUsuario"></span></span>
            <a href="cliente_inicio.html">🏠 Inicio</a>
            <a href="restaurantes.html">🍽️ Restaurantes</a>
            <a href="cliente_pedidos.html">📦 Mis pedidos</a>
            <a href="cliente_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()" style="color: #dc3545;">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="hero">
        <h1>Bienvenido, <span id="heroNombre"></span></h1>
        <p>¿Qué te apetece comer hoy?</p>
        <div class="search-box">
            <input id="buscador" placeholder="Buscar restaurante..." onkeyup="buscarRestaurante()">
        </div>
    </div>

    <div class="container">
        <h2>Restaurantes cerca de ti</h2>
        <div class="grid" id="restaurantes"></div>
        <p id="error"></p>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";
        let restaurantes = [];

        // Verificar autenticación
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        // Mostrar nombre del usuario
        const nombre = localStorage.getItem("usuario_nombre") || "Usuario";
        document.getElementById("nombreUsuario").textContent = nombre;
        document.getElementById("heroNombre").textContent = nombre;

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            window.location.href = "login.html";
        }

        async function cargarRestaurantes() {
            try {
                const res = await fetch(API + "/restaurantes.php");
                if (!res.ok) throw new Error("Error cargando restaurantes");
                restaurantes = await res.json();
                mostrarRestaurantes(restaurantes);
            } catch (err) {
                document.getElementById("error").textContent = err.message;
            }
        }

        function mostrarRestaurantes(lista) {
            const cont = document.getElementById("restaurantes");
            cont.innerHTML = "";
            
            if (lista.length === 0) {
                cont.innerHTML = "<p>No se encontraron restaurantes</p>";
                return;
            }
            
            lista.forEach(r => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="https://picsum.photos/300/200?random=${r.id}">
                    <div class="card-content">
                        <h3>${r.nombre}</h3>
                        <p>${r.descripcion || "Restaurante con excelente comida"}</p>
                        <button onclick="verMenu(${r.id})">Ver menú</button>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function buscarRestaurante() {
            const texto = document.getElementById("buscador").value.toLowerCase();
            const filtrados = restaurantes.filter(r => r.nombre.toLowerCase().includes(texto));
            mostrarRestaurantes(filtrados);
        }

        function verMenu(id) {
            window.location.href = "restaurante.html?id=" + id;
        }

        cargarRestaurantes();
    </script>
</body>
</html>

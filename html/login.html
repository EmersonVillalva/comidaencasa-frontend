<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <div class="topbar">
        <h2>ComidaEnCasa</h2>
        <div>
            <a href="login.html" aria-current="page">Login</a>
            <a href="register.html">Registro</a>
            <a href="restaurantes.html">Restaurantes</a>
        </div>
    </div>

    <div class="form-card" id="main-content" tabindex="-1">
        <h2>Iniciar sesión</h2>
        
        <div class="grupo-form">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" placeholder="ejemplo@correo.com" aria-required="true">
        </div>
        
        <div class="grupo-form">
            <label for="password">Contraseña</label>
            <input id="password" type="password" placeholder="********" aria-required="true">
        </div>
        
        <button onclick="login()" aria-label="Iniciar sesión">Entrar</button>
        <div id="error" role="alert"></div>
        
        <p style="text-align:center; margin-top:15px;">
            ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </p>
    </div>

    <script>
        const API = "https://backend-production-78b0.up.railway.app/api";

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("error");

            if (!email || !password) {
                errorDiv.innerHTML = "Completa todos los campos";
                errorDiv.setAttribute("role", "alert");
                return;
            }

            try {
                const res = await fetch(API + "/login.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || "Login incorrecto");

                localStorage.setItem("token", data.token);
                localStorage.setItem("usuario_id", data.usuario.id);
                localStorage.setItem("usuario_nombre", data.usuario.nombre);
                localStorage.setItem("usuario_email", data.usuario.email);
                localStorage.setItem("usuario_rol", data.usuario.rol);
                localStorage.setItem("usuario_ciudad", data.usuario.ciudad || "General");
                
                if (data.usuario.restaurante_id) {
                    localStorage.setItem("usuario_restaurante_id", data.usuario.restaurante_id);
                }
                
                if (data.usuario.rol === 'restaurante') {
                    window.location.href = "restaurante_panel.html";
                } else if (data.usuario.rol === 'repartidor') {
                    window.location.href = "repartidor.html";
                } else {
                    window.location.href = "cliente_inicio.html";
                }
                
            } catch (err) {
                errorDiv.innerHTML = err.message;
                errorDiv.setAttribute("role", "alert");
            }
        }

        document.getElementById("password").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                login();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Repartidor - ComidaEnCasa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <div class="topbar">
        <h2>ComidaEnCasa - Repartidor</h2>
        <div>
            <span>🛵 Hola, <span id="nombreUsuario"></span></span>
            <a href="repartidor.html">📦 Pedidos</a>
            <a href="repartidor_perfil.html">⚙️ Mi perfil</a>
            <a href="#" onclick="logout()" style="color: #dc3545;">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div class="container" id="main-content" tabindex="-1">
        <div style="text-align: right; margin-bottom: 20px;">
            <button id="btnBuscarPedidos" class="btn-buscar" onclick="buscarNuevosPedidos()">🔄 Buscar pedidos disponibles</button>
        </div>

        <div id="seccion-disponibles" style="display: none;">
            <h2>📦 Pedidos disponibles</h2>
            <div id="pedidos-disponibles"></div>
        </div>

        <div id="seccion-en-curso">
            <h2>✅ Mis pedidos en curso</h2>
            <div id="pedidos-en-curso"></div>
        </div>
    </div>

    <footer>
        <p>ComidaEnCasa - Tu comida favorita a domicilio</p>
    </footer>

    <script>
        // Manejador global para ignorar errores de extensiones
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && event.reason.message && 
                (event.reason.message.includes('message channel closed') ||
                 event.reason.message.includes('listener indicated'))) {
                event.preventDefault();
                return;
            }
            console.warn('Error no manejado:', event.reason);
        });

        const API = "https://backend-production-78b0.up.railway.app/api";

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const rol = localStorage.getItem("usuario_rol");
        if (rol !== 'repartidor') {
            window.location.href = "login.html";
        }

        document.getElementById("nombreUsuario").textContent = localStorage.getItem("usuario_nombre") || "Repartidor";

        let estaCargando = false;

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario_rol");
            localStorage.removeItem("usuario_nombre");
            localStorage.removeItem("usuario_email");
            localStorage.removeItem("usuario_ciudad");
            window.location.href = "login.html";
        }

        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function cargarPedidosEnCurso() {
            const contenedor = document.getElementById("pedidos-en-curso");
            if (!contenedor) return;
            
            contenedor.innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando...</p></div>';

            try {
                const res = await fetch(API + "/pedidos_aceptados_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!res.ok) {
                    contenedor.innerHTML = '<p class="error-mensaje">Error al cargar pedidos</p>';
                    return;
                }

                const pedidos = await res.json();
                
                if (!pedidos || pedidos.length === 0) {
                    contenedor.innerHTML = '<p class="sin-pedidos">No tienes pedidos en curso actualmente.</p>';
                    return;
                }

                contenedor.innerHTML = "";
                
                for (const pedido of pedidos) {
                    const card = document.createElement("div");
                    card.className = "pedido-aceptado-card";
                    card.innerHTML = `
                        <h3>📦 Pedido #${pedido.id}</h3>
                        <p><strong>Restaurante:</strong> ${escapeHtml(pedido.restaurante)}</p>
                        <p><strong>Cliente:</strong> ${escapeHtml(pedido.cliente)}</p>
                        <p><strong>Dirección:</strong> ${escapeHtml(pedido.cliente_direccion)}</p>
                        <p><strong>Total:</strong> ${pedido.total.toFixed(2)} €</p>
                        <p><strong>Estado:</strong> <span class="estado-${pedido.estado.replace(' ', '-')}">${pedido.estado}</span></p>
                        ${pedido.estado === 'en camino' ? `<button class="btn-entregar" onclick="marcarEntregado(${pedido.id})">✅ Marcar como entregado</button>` : ''}
                    `;
                    contenedor.appendChild(card);
                }
                
            } catch (err) {
                console.error(err);
                contenedor.innerHTML = '<p class="error-mensaje">Error al conectar con el servidor</p>';
            }
        }

        async function marcarEntregado(pedidoId) {
            try {
                const res = await fetch(API + "/actualizar_estado_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId, estado: "entregado" })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert("✅ Pedido marcado como entregado");
                    cargarPedidosEnCurso();
                } else {
                    alert("❌ Error: " + (data.error || "No se pudo actualizar"));
                }
            } catch (err) {
                console.error(err);
                alert("Error al conectar con el servidor");
            }
        }

        async function buscarNuevosPedidos() {
            if (estaCargando) return;
            estaCargando = true;
            
            const seccionDisponibles = document.getElementById("seccion-disponibles");
            const pedidosDiv = document.getElementById("pedidos-disponibles");
            
            if (!seccionDisponibles || !pedidosDiv) return;
            
            seccionDisponibles.style.display = "block";
            pedidosDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Buscando pedidos...</p></div>';

            try {
                const res = await fetch(API + "/pedidos_repartidor.php", {
                    headers: { "Authorization": "Bearer " + token }
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Error");

                if (!data.pedidos || data.pedidos.length === 0) {
                    pedidosDiv.innerHTML = '<p class="sin-pedidos">No hay pedidos disponibles en tu ciudad</p>';
                    estaCargando = false;
                    return;
                }

                pedidosDiv.innerHTML = "";
                
                for (const pedido of data.pedidos) {
                    const card = document.createElement("div");
                    card.className = "pedido-card";
                    card.innerHTML = `
                        <h3>🍽️ ${escapeHtml(pedido.restaurante)}</h3>
                        <p><strong>Cliente:</strong> ${escapeHtml(pedido.cliente)}</p>
                        <p><strong>Dirección:</strong> ${escapeHtml(pedido.cliente_direccion)}</p>
                        <p><strong>Total:</strong> ${pedido.total.toFixed(2)} €</p>
                        <div class="flex-buttons">
                            <button class="btn-aceptar" onclick="aceptarPedido(${pedido.id})">✅ Aceptar</button>
                            <button class="btn-rechazar" onclick="rechazarPedido(${pedido.id}, this)">❌ Rechazar</button>
                        </div>
                    `;
                    pedidosDiv.appendChild(card);
                }
                estaCargando = false;

            } catch (err) {
                console.error(err);
                pedidosDiv.innerHTML = `<p class="error-mensaje">Error: ${err.message}</p>`;
                estaCargando = false;
            }
        }

        async function aceptarPedido(pedidoId) {
            try {
                const res = await fetch(API + "/aceptar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Pedido aceptado");
                    document.getElementById("seccion-disponibles").style.display = "none";
                    cargarPedidosEnCurso();
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Error al conectar");
            }
        }

        async function rechazarPedido(pedidoId, btn) {
            try {
                const res = await fetch(API + "/rechazar_pedido.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ pedido_id: pedidoId })
                });

                if (res.ok) {
                    const card = btn.closest('.pedido-card');
                    if (card) card.remove();
                    
                    const restantes = document.querySelectorAll('#pedidos-disponibles .pedido-card');
                    if (restantes.length === 0) {
                        document.getElementById("pedidos-disponibles").innerHTML = '<p class="sin-pedidos">No hay más pedidos disponibles</p>';
                    }
                } else {
                    const data = await res.json();
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Error al conectar");
            }
        }

        cargarPedidosEnCurso();
    </script>
</body>
</html>
